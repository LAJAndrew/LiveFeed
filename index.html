
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA Community Events</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    margin:0;
    background:#0f172a;
    color:white;
}
header{
    padding:20px;
    font-size:22px;
    font-weight:600;
    background:#020617;
}
#events{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:16px;
}
.card{
    background:#111827;
    padding:16px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
}
.card h3{
    margin:0 0 6px 0;
}
.meta{
    opacity:0.7;
    font-size:14px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://sigivdodtiewgscokdmk.supabase.co";
const SUPABASE_KEY = "sb_publishable_gK-ytjOr7gd9mygiS2YHQA_qLhtCaCV";

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

async function loadEvents(){

  const { data, error } = await supabase
    .from("events")
    .select("*")
    .order("start_time");

  console.log("Events:", data);

  if(error){
    console.log("Database error:", error);
    return;
  }

  const container = document.getElementById("events");
  container.innerHTML = "";

  if(!data || data.length === 0){
      container.innerHTML = "<p style='opacity:.6'>Database connected. No events yet.</p>";
      return;
  }

  data.forEach(event=>{
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${event.title || "Event"}</h3>
        <div class="meta">${event.organization || ""}</div>
        <div class="meta">${event.location || ""}</div>
        <div class="meta">${event.start_time || ""}</div>
      `;

      container.appendChild(card);
  });

}

window.addEventListener("DOMContentLoaded", loadEvents);
</script>

</head>

<body>

<header>LA Community Events</header>

<div id="events"></div>

</body>
</html>
